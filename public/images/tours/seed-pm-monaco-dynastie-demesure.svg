<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect x="0" y="300" width="800" height="100" fill="rgba(0,0,0,0.4)"/>
  <text x="400" y="180" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="white" filter="url(#shadow)">Monaco</text>
  <text x="400" y="230" text-anchor="middle" font-family="Georgia, serif" font-size="42" font-weight="bold" fill="white" filter="url(#shadow)">Dynastie &amp; Démesure</text>
  <text x="400" y="340" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.8)">Monaco — Audio Tour Premium</text>
  <text x="400" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">Photo placeholder — à remplacer</text>
  <rect x="20" y="20" width="120" height="30" rx="15" fill="rgba(255,255,255,0.2)"/>
  <text x="80" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">PREMIUM</text>
</svg>