name: E2E Data Cleanup
on:
  schedule:
    - cron: '0 3 * * *'  # 3h UTC every night
  workflow_dispatch: {}    # manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
      - name: Write amplify_outputs.json
        run: echo "${{ secrets.AMPLIFY_OUTPUTS_B64 }}" | base64 -d > amplify_outputs.json
      - run: node scripts/cleanup-e2e-data.mjs
